<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PayPerCrawl API</title>
    <style>
      :root { color-scheme: dark; }
      body {
        font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
        background: #0a0e14;
        color: #e6e8ea;
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 1.5rem;
      }
      .card {
        max-width: 520px;
        width: 100%;
        text-align: center;
      }
      h1 {
        font-family: "Instrument Serif", ui-serif, Georgia, serif;
        font-size: 2.25rem;
        margin: 0 0 0.5rem;
      }
      h1 .accent { color: #FF6B35; font-style: italic; }
      p { color: #8a909a; line-height: 1.6; }
      code {
        background: rgba(255,255,255,0.07);
        padding: 0.15em 0.4em;
        border-radius: 4px;
        font-size: 0.9em;
      }
      a { color: #4DA2FF; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .endpoints {
        margin-top: 1.5rem;
        font-family: ui-monospace, monospace;
        font-size: 0.85rem;
        text-align: left;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 1rem 1.25rem;
      }
      .endpoints div { padding: 0.25rem 0; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>PayPer<span class="accent">Crawl</span> API</h1>
      <p>
        x402 micropayments for AI crawlers. This URL is the API host. The
        publisher dashboard lives at
        <a href="https://paypercrawl.vercel.app">paypercrawl.vercel.app</a>.
      </p>
      <div class="endpoints">
        <div>GET  <code>/api/health</code></div>
        <div>POST <code>/api/auth/siwe/nonce</code></div>
        <div>POST <code>/api/auth/siwe/verify</code></div>
        <div>GET  <code>/api/sites</code> (auth)</div>
        <div>GET  <code>/gateway/check?domain=…</code></div>
        <div>POST <code>/api/gateway/verify</code></div>
      </div>
    </div>
  </body>
</html>
